<div class="form-group{% if select_field.errors or new_field.errors %} has-error{% endif %}">
    <label for="{{ select_field.id_for_label }}">
        {{ label }}{% if show_required %}<span class="field-required" title="Required when submitting">*</span>{% endif %}
    </label>
    <div class="lookup-field">
        <div class="category-input-group lookup-select-wrap">
            {{ select_field }}
            <button type="button" class="category-action-btn category-add-btn lookup-add-btn" title="{{ add_title }}" aria-label="{{ add_title }}">
                <svg width="16" height="16" viewBox="0 0 16 16" fill="none" aria-hidden="true">
                    <path d="M8 3.5v9M3.5 8h9" stroke="currentColor" stroke-width="1.75" stroke-linecap="round"/>
                </svg>
            </button>
        </div>
        <div class="category-input-group category-input-group--new lookup-new-wrap" hidden>
            {{ new_field }}
            <button type="button" class="category-action-btn category-back-btn lookup-back-btn" title="{{ back_title }}" aria-label="{{ back_title }}">
                <svg width="16" height="16" viewBox="0 0 16 16" fill="none" aria-hidden="true">
                    <path d="M10.5 12.5L6 8l4.5-4.5" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
            </button>
        </div>
    </div>
    {% for error in select_field.errors %}<p class="field-error" role="alert">{{ error }}</p>{% endfor %}
    {% for error in new_field.errors %}<p class="field-error" role="alert">{{ error }}</p>{% endfor %}
</div>
