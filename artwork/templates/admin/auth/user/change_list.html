{% extends "admin/change_list.html" %}
{% load i18n %}

{% block object-tools-items %}
  <li>
    <form method="post" action="{% url 'admin:auth_user_sync_ad' %}" style="display:inline;">
      {% csrf_token %}
      <button type="submit" class="button" style="background:#CC1C24;color:#fff;border:none;padding:8px 14px;border-radius:4px;cursor:pointer;font-weight:600;">
        Sync AD Users
      </button>
    </form>
  </li>
  <li>
    <a href="{% url 'admin:sync_ldap_users' %}" class="historylink">{% translate 'AD sync options' %}</a>
  </li>
  {{ block.super }}
{% endblock %}
