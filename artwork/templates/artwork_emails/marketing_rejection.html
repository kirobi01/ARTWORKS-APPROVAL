<!DOCTYPE html>
<html>
<body style="font-family:Arial,sans-serif;color:#333;">
<h2 style="color:#dc3545;">Artwork REJECTED — Revision Required</h2>
<p>Artwork <strong>{{ artwork_no }}</strong> was rejected by <strong>{{ stage_name }}</strong>.</p>
<table style="border-collapse:collapse;">
    <tr><td style="padding:5px;font-weight:bold;">Product:</td><td>{{ product_name }}</td></tr>
    <tr><td style="padding:5px;font-weight:bold;">Revision #:</td><td>{{ revision_count }}</td></tr>
    <tr><td style="padding:5px;font-weight:bold;">Comments:</td><td>{{ rejection_comments }}</td></tr>
</table>
<p><a href="{{ approval_url }}">Edit and resubmit artwork</a></p>
</body>
</html>
