<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kapa Oil Refineries Test Report</title>
<style>
       
    body {
        font-family: Arial, sans-serif;
        background-color: #f4f4f9;
        margin: 0;
        padding: 20px;
        color: #333;
    }

    /* Header styles */
    .header {
        background-color: #CC1C24;
        color: white;
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 20px;
        border-radius: 8px;
        box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
        position: relative;
    }

    .header::after {
        content: '';
        position: absolute;
        bottom: 0;
        left: 0;
        right: 0;
        height: 3px;
        background-color: #0B5394;
        border-radius: 0 0 4px 4px;
    }

    /* Container styles */
    .container {
        max-width: 900px;
        margin: auto;
        padding: 20px;
    }

    /* Form container styles */
    .form-container {
        background-color: #fff;
        border-radius: 8px;
        box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
        padding: 30px;
        margin-bottom: 20px;
        max-width: 800px;
        margin: 0 auto;
    }

    /* Form element labels */
    .form-container label,
    .option-label {
        display: block;
        margin-bottom: 8px;
        font-weight: bold;
        color: #333;
    }

    /* Inputs, selects, and textarea styles */
    .form-container input[type="text"],
    .form-container input[type="date"],
    .form-container input[type="number"],
    .form-container select,
    .form-container textarea,
    .two-column input[type="text"],
    .two-column input[type="date"],
    .two-column input[type="number"],
    .two-column select,
    .two-column textarea {
        width: 100%;
        padding: 10px;
        margin-bottom: 15px;
        font-size: 16px;
        border: 1px solid #ccc;
        border-radius: 4px;
        box-sizing: border-box;
        height: 40px;
        transition: border-color 0.3s;
    }

    /* Focus styles for inputs */
    .form-container input[type="text"]:focus,
    .form-container input[type="date"]:focus,
    .form-container select:focus,
    .form-container textarea:focus,
    .two-column input[type="text"]:focus,
    .two-column input[type="date"]:focus,
    .two-column select:focus,
    .two-column textarea:focus {
        border-color: #3A6D8C;
        outline: none;
    }

    /* Flex and Grid Layout */
    .two-column {
        display: flex;
        flex-wrap: wrap;
        gap: 20px;
        margin-bottom: 20px;
        align-items: stretch;
    }

    .two-column .column,
    .two-column div {
        flex: 1 1 calc(50% - 20px);
    }

    .full-width {
        width: 100%;
    }

    /* Button styles (standard buttons) */
    .form-container button {
        background-color: #007bff;
        border: none;
        border-radius: 4px;
        color: white;
        padding: 8px 12px;
        font-size: 14px;
        cursor: pointer;
        transition: background-color 0.3s ease, transform 0.2s;
    }

    .form-container button:hover {
        background-color: #0056b3;
        transform: translateY(-1px);
    }

    /* Image upload button styles (distinct from standard buttons) */
    button[type="image_upload"] {
        background-color: #28a745; /* Green color */
        padding: 8px 12px;
        font-size: 14px;
        cursor: pointer;
        border-radius: 4px;
        transition: background-color 0.3s ease, transform 0.2s;
    }

    button[type="image_upload"]:hover {
        background-color: #218838;
        transform: translateY(-1px);
    }

    /* Message and error styles */
    .message, .error {
        font-weight: bold;
        margin-top: 10px;
    }

    .message {
        color: green;
    }

    .error {
        color: red;
    }

    .modal {
        display: none; /* Hidden by default */
        position: fixed;
        z-index: 1;
        left: 0;
        top: 0;
        width: 100%;
        height: 100%;
        background-color: rgba(0, 0, 0, 0.5);
    }

    .modal-content {
        background-color: #fff;
        margin: 15% auto;
        padding: 20px;
        border-radius: 10px;
        width: 50%;
    }

    .modal-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        font-size: 20px;
        margin-bottom: 20px;
    }

    .submit-button {
        font-size: 18px;
        padding: 10px 20px;
        background-color: #007BFF;
        color: white;
        border: none;
        cursor: pointer;
        border-radius: 5px;
    }

    .submit-button:hover {
        background-color: #0056b3;
    }

    #tests-container {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); /* 2 or 3 columns */
        gap: 10px;
    }

    #tests-container label {
        display: block;
        margin-bottom: 10px;
    }

    .hidden {
        display: none;
    }

    /* Form styles */
    form {
        max-width: 600px;
        margin: auto;
    }
    #form-error {
        color: red;
        display: none;
    }
    .loading {
        display: inline-block;
        margin-left: 5px; }
    label {
        display: block;
        margin: 10px 0 5px;
    }

    select {
        width: 100%;
        padding: 10px;
        margin-bottom: 10px;
    }

    button {
        padding: 10px 20px;
        background-color: #007BFF;
        color: white;
        border: none;
        cursor: pointer;
    }

    button:hover {
        background-color: #0056b3;}
    /* Checkbox group label styles */
    .checkbox-group label {
        display: block;
        padding: 8px;
        margin-bottom: 5px;
        background-color: #f9f9f9;
        border-radius: 4px;
    }

    /* Option label margin */
    .option-label {
        margin-top: 10px;
        margin-bottom: 5px;
    }

    /* Test options styles */
    #material-options select,
    #test-options input[type="checkbox"] {
        width: 100%;
    }

    /* Mobile responsiveness for form layout */
    @media (max-width: 768px) {
        .two-column div {
            flex: 1 1 100%;
        }

        .form-container {
            padding: 20px;
        }
    }

    .approver-selection {
        display: flex;
        gap: 10px;
        align-items: center;
    }
    
    .cancel-button {
        padding: 8px 12px;
        background-color: #dc3545;
        color: white;
        border: none;
        border-radius: 4px;
        cursor: pointer;
    }
    
    .cancel-button:hover {
        background-color: #c82333;
    }  
    a {
        color: inherit;
        text-decoration: none;
    }      
        
</style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1><a href="{% url 'dashboard' %}">Kapa Oil Refineries Ltd</a></h1>
            <h3><a href="{% url 'dashboard' %}">Raw Material Test Report</a></h3>
        </div>
    
        <div class="form-container">
            <form id="test-form" method="post" enctype="multipart/form-data">
                {% csrf_token %}
                
                <div>
                    <label for="kapapurchases">Select Purchase Department</label>
                    <select id="approved-mgt" name="KapaPurchases" required onchange="window.location.href=this.value;">
                        <option value="" disabled selected>Select Purchase Department</option>
                        <option value="{% url 'imp_test_request' %}">Imports</option>
                        <option value="{% url 'test_request' %}">Local</option>
                    </select>
                </div> 
                
                <!-- RMTR No and Date -->
                <div class="two-column">
                    <div>
                        <label for="rmtr-no">RMTR NO:</label>
                        <input type="text" id="rmtr-no" name="rmtr-no" value="{{ rmtr_no }}" readonly>
                    </div>
                    <div>
                        <label for="date">Date:</label>
                        <input type="date" id="date" name="date" required>
                    </div>
                </div>

                <!-- Supplier Selection -->
                <div class="two-column">
                    <div>
                        <label for="supplier">Supplier:</label>
                        <select id="supplier" name="supplier" required>
                            <option value="" disabled selected>Select a supplier</option>
                            <!-- Supplier options will go here -->
                        </select>
                        <button type="button" onclick="toggleAddSupplierForm()">Add Supplier</button>
                    </div>
                </div>
                <!-- Add Supplier Form -->
                <div id="add-supplier-form" style="display:none;">
                    <h4>Add New Supplier</h4>

                    <label for="new-supplier-name">Supplier Name:</label>
                    <input type="text" id="new-supplier-name" name="new-supplier-name">

                    <button type="button" id="add-supplier-button">Create New Supplier</button>
                </div>


                <div>
                    <label for="material-type">Material Type:</label>
                    <select id="material-type" name="material_type" required>
                        <option value="">--Select Material Type--</option>
                        <option value="food">Food Raw Materials</option>
                        <option value="non-food">Non Food Raw Materials</option>
                        <option value="packaging">Packaging Material</option>
                    </select>
                
                    <!-- Sub-categories -->
                    <div id="sub-category-section" class="hidden">
                        <label for="sub-category">Select Sub-Category:</label>
                        <select id="sub-category" name="sub_category" required></select>  <!-- Change here -->
                    </div>
                
                    <!-- Tests carried out (shown after modal selection) -->
                    <div id="tests-section" class="hidden">
                        <h3>Selected Tests:</h3>
                        <div id="selected-tests-list"></div>
                    </div>
                </div>
                
                <!-- Modal for Test Selection -->
                <div id="testsModal" class="modal">
                    <div class="modal-content">
                        <div class="modal-header">
                            <h2>Select Tests</h2>
                            <span class="close-button">&times;</span>
                        </div>
                        <div id="tests-container"></div>
                        <div class="modal-actions">
                            <button id="submit-modal" class="submit-button">Select</button>
                        </div>
                    </div>
                </div>



                <!-- UOM and Quantity -->
                <div class="two-column">
                    <div class="column">
                        <label for="uom">UOM:</label>
                        <select id="uom" name="uom" required>
                            <option value="" disabled selected>Select UOM</option>
                            <option value="kgs">Kgs</option>
                            <option value="ltrs">Ltrs</option>
                            <option value="pcs">Pcs</option>
                            <option value="tonnes">Tonnes</option>
                            <option value="litres">Litres</option>
                            <option value="millilitres">Millilitres</option>
                            <option value="grams">Grams</option>
                        </select>
                    </div>
                    <div class="column">
                        <label for="quantity">Quantity:</label>
                        <input type="number" id="quantity" name="quantity" required>
                    </div>
                </div>

                <!-- Specs and Image Upload -->
                <div class="two-column">
                    <div>
                        <label for="specs">SPECS:</label>
                        <input type="text" id="specs" name="specs" required>
                    </div>
                    <div>
                        <div>
                            <label for="image-upload" class="image-upload-button">Image Upload</label>
                            <input type="file" id="image-upload" name="image-upload" class="image-upload-button" onchange="previewImage(event)">
                        </div>
                        <div id="imagePreviewContainer"></div>
                    </div>
                </div>

                <!-- Department and HOD -->
                <div class="two-column">
                    <div>
                        <label for="plant">Department:</label>
                        <select id="plant" name="plant" required>
                            <option value="" disabled selected>Select a Department</option>
                            <!-- Options will be populated by JavaScript -->
                        </select>
                    </div>
                    
                    <div>
                        <label for="hod">Head of Department:</label>
                        <input id="hod" name="hod" type="text" readonly />
                    </div>
                </div>           
    
                <!-- Justification -->
                <div>
                    <label for="justification">Justification:</label>
                    <textarea data-grammarly-disable= "true" id="justification" name="justification" rows="4" required></textarea>
                </div>

                <!-- Requested By and Approved Mgt -->
                <div class="two-column">
                    <div>
                        <label for="requested-by">Requested By:</label>
                        <input type="text" id="requested-by" name="requested-by">
                    </div>
                  <!-- <div>
                        <label for="approved-mgt">Approved Mgt:</label>
                        <select id="approved-mgt" name="approved-mgt" required>
                            <option value="" disabled selected>Select an approver</option>
                            {% for approver in approved_mgt_list %}
                                <option value="{{ approver.id }}">{{ approver.full_name }}</option>
                            {% endfor %}
                            
                        </select>
                    </div> -->
                    <div class="two-column">
                        <div>
                            <label for="approved-mgt">First Approver:</label>
                            <select id="approved-mgt" name="approved-mgt" required onchange="showSecondApprover(this.value)">
                                <option value="" disabled selected>Select an approver</option>
                                <option value="jaivin">Jaivin</option>
                                <option value="milan">Milan</option>
                                <option value="neev">Neev</option>
                                <option value="sid">Sid</option>
                            </select>
                        </div>
                        
                        <!-- Second Approver (Hidden by default) -->
                        <div id="second-approver-container" style="display: none;">
                            <label for="second-approver">Second Approver:</label>
                            <div class="approver-selection">
                                <select id="second-approver" name="second-approver">
                                    <option value="" disabled selected>Select an approver</option>
                                    <option value="jaivin">Jaivin</option>
                                    <option value="milan">Milan</option>
                                    <option value="neev">Neev</option>
                                    <option value="sid">Sid</option>
                                </select>
                                <button type="button" onclick="cancelSecondApprover()" class="cancel-button">Cancel</button>
                            </div>
                        </div>
                    
                        <!-- Hidden input to store combined approvers -->
                        <input type="hidden" id="combined-approvers" name="approved-mgt">
                    </div>
                    
                    
                </div>

                <!-- Submit Button -->
                <div>
                    {{ form.as_p }}
                    <button type="submit" id="submit-form-button">Submit</button>
                    <div id="form-error" style="color: red; display: none;"></div>
                    <div id="form-message" style="color: green; display: none;"></div>
                    <div id="loading-indicator" style="display: none;">Loading...</div>
                    
                </div>

                
            </form>
        </div>
    </div>
</body>




<script>
   
    document.addEventListener('DOMContentLoaded', function () {
    const form = document.getElementById('test-form');
    const submitFormButton = document.getElementById('submit-form-button');
    const addSupplierButton = document.getElementById('add-supplier-button');

    // Handle full form submission
    form.addEventListener('submit', handleFormSubmission);

    // Handle supplier creation independently
    addSupplierButton.addEventListener('click', addSupplier);

    // Fetch RMTR number when the DOM is fully loaded
    fetch('/generate-rmtr-number/')
        .then(response => response.json())
        .then(data => {
            const rmtrNoInput = document.getElementById('rmtr-no');
            if (rmtrNoInput && data.rmtr_number) {
                rmtrNoInput.value = data.rmtr_number;
            }
        })
        .catch(error => console.error('Error fetching RMTR number:', error));
});

  // Get the current date
  const currentDate = new Date();

  // Format it as YYYY-MM-DD (the format required for <input type="date">)
  const formattedDate = currentDate.toISOString().split('T')[0]; // Get date part (YYYY-MM-DD)

  // Set the value of the date input to the current date
  const dateInput = document.getElementById('date');
  dateInput.value = formattedDate;
  dateInput.disabled = true; 
      
    document.addEventListener('DOMContentLoaded', function() {
        const plantSelect = document.getElementById('plant');
        const hodInput = document.getElementById('hod');
    
        // Fetch plant and HOD data from the backend
        fetch('/get-plant-hod-data/')
            .then(response => response.json())
            .then(data => {
                // Populate the department dropdown dynamically
                data.forEach(plant => {
                    const option = document.createElement('option');
                    option.value = plant.id;  // Use the plant ID for value
                    option.text = plant.name;
                    plantSelect.appendChild(option);
                });
            })
            .catch(error => console.error('Error fetching plant HOD data:', error));
    
        // Update HOD field when a department is selected
        plantSelect.addEventListener('change', function() {
            const selectedPlant = plantSelect.options[plantSelect.selectedIndex];
            const selectedPlantId = selectedPlant.value;
    
            // Fetch the HOD based on the selected department
            fetch('/get-plant-hod-data/')
                .then(response => response.json())
                .then(data => {
                    const plant = data.find(p => p.id == selectedPlantId);
                    if (plant) {
                        hodInput.value = plant.hod;
                    }
                })
                .catch(error => console.error('Error fetching HOD:', error));
        });
    });




// DOM elements
const materialTypeSelect = document.getElementById('material-type');
const subCategorySelect = document.getElementById('sub-category');
const subCategorySection = document.getElementById('sub-category-section');
const testsModal = document.getElementById('testsModal');
const testsContainer = document.getElementById('tests-container');
const testsSection = document.getElementById('tests-section');
const selectedTestsList = document.getElementById('selected-tests-list');
const submitModalButton = document.getElementById('submit-modal');
let selectedTests = [];

// Object to store materials, subcategories, and tests fetched from the backend
let materialSubCategories = {};

// Fetch materials, subcategories, and tests from the Django backend
function fetchMaterialData() {
    fetch('/fetch-material-data/')
        .then(response => response.json())
        .then(data => {
            materialSubCategories = {};
            data.materials.forEach(material => {
                materialSubCategories[material.material] = {};
                material.subcategories.forEach(subcategory => {
                    materialSubCategories[material.material][subcategory.name] = subcategory.tests;
                });
            });
            populateMaterialTypes();  // Populate the material types after data is fetched
        })
        .catch(error => console.error('Error fetching data:', error));
}

// Populate the material type dropdown
function populateMaterialTypes() {
    materialTypeSelect.innerHTML = ''; // Clear previous options
    materialTypeSelect.appendChild(new Option('--Select Material Type--', ''));
    Object.keys(materialSubCategories).forEach(material => {
        const option = document.createElement('option');
        option.value = material;
        option.textContent = material;
        materialTypeSelect.appendChild(option);
    });
}

// Event listener for material type dropdown
materialTypeSelect.addEventListener('change', function () {
    const selectedMaterialType = materialTypeSelect.value;
    if (selectedMaterialType) {
        populateSubCategories(selectedMaterialType);
        subCategorySection.classList.remove('hidden');
        testsSection.classList.add('hidden');
    } else {
        subCategorySection.classList.add('hidden');
        testsSection.classList.add('hidden');
    }
});

// Populate sub-categories based on selected material type
function populateSubCategories(materialType) {
    subCategorySelect.innerHTML = ''; // Clear previous options
    subCategorySelect.appendChild(new Option('--Select Sub-Category--', ''));
    const subCategories = Object.keys(materialSubCategories[materialType] || {});
    subCategories.forEach(subCategory => {
        const option = document.createElement('option');
        option.value = subCategory;
        option.textContent = subCategory;
        subCategorySelect.appendChild(option);
    });
}

// Event listener for sub-category dropdown
subCategorySelect.addEventListener('change', function () {
    const selectedMaterialType = materialTypeSelect.value;
    const selectedSubCategory = subCategorySelect.value;
    if (selectedSubCategory) {
        openModal(selectedMaterialType, selectedSubCategory);
    }
});

// Open modal with tests for the selected sub-category
function openModal(materialType, subCategory) {
    testsContainer.innerHTML = '';  // Clear previous tests
    selectedTests = [];
    const tests = materialSubCategories[materialType]?.[subCategory] || [];

    tests.forEach(test => {
        const label = document.createElement('label');
        const checkbox = document.createElement('input');
        checkbox.type = 'checkbox';
        checkbox.value = test;
        checkbox.checked =true;
        selectedTests.push(test);


        label.appendChild(checkbox);
        label.appendChild(document.createTextNode(test));
        testsContainer.appendChild(label);
    });

    // Show modal
    testsModal.style.display = 'block';
}

// Close modal and save selected tests
submitModalButton.addEventListener('click', saveAndCloseModal);
document.querySelector('.close-button').addEventListener('click', saveAndCloseModal);

function saveAndCloseModal() {
    // Gather selected tests
    const checkboxes = testsContainer.querySelectorAll('input[type="checkbox"]:checked');
    selectedTests = Array.from(checkboxes).map(checkbox => checkbox.value);

    // Display selected tests
    selectedTestsList.innerHTML = selectedTests.length > 0 ? selectedTests.join(', ') : 'No tests selected';
    testsSection.classList.remove('hidden');

    // Create a hidden field to send selected tests
    let testsInput = document.getElementById('selected-tests-input');
    if (!testsInput) {
        testsInput = document.createElement('input');
        testsInput.type = 'hidden';
        testsInput.name = 'selected_tests'; // This is the name the backend will recognize
        testsInput.id = 'selected-tests-input';
        document.forms[0].appendChild(testsInput); // Assuming the form is the first one on the page
    }
    testsInput.value = selectedTests.join(', '); // Join selected tests into a string

    // Close modal
    testsModal.style.display = 'none';
}

// Close modal if clicking outside of it
window.onclick = function(event) {
    if (event.target === testsModal) {
        saveAndCloseModal();
    }
};

// Call fetchMaterialData() to load the material, subcategories, and tests from the backend when the page loads
document.addEventListener('DOMContentLoaded', function () {
    fetchMaterialData();
});





function showSecondApprover(firstApproverValue) {
    const secondApproverContainer = document.getElementById('second-approver-container');
    const secondApproverSelect = document.getElementById('second-approver');
    const combinedApproversInput = document.getElementById('combined-approvers');
    
    // Show the second approver container
    secondApproverContainer.style.display = 'block';
    
    // Reset second approver selection
    secondApproverSelect.value = '';
    
    // Disable the selected first approver in second approver list
    Array.from(secondApproverSelect.options).forEach(option => {
        option.disabled = option.value === firstApproverValue;
    });
    
    // Update combined approvers
    combinedApproversInput.value = firstApproverValue;
}

function cancelSecondApprover() {
    const secondApproverContainer = document.getElementById('second-approver-container');
    const secondApproverSelect = document.getElementById('second-approver');
    const firstApproverSelect = document.getElementById('approved-mgt');
    const combinedApproversInput = document.getElementById('combined-approvers');
    
    // Hide the second approver container
    secondApproverContainer.style.display = 'none';
    
    // Reset second approver selection
    secondApproverSelect.value = '';
    
    // Update combined approvers with just the first approver
    combinedApproversInput.value = firstApproverSelect.value;
}

// Add event listener for second approver selection
document.getElementById('second-approver').addEventListener('change', function() {
    const firstApproverSelect = document.getElementById('approved-mgt');
    const combinedApproversInput = document.getElementById('combined-approvers');
    
    if (this.value) {
        // Combine both approvers with comma separation
        combinedApproversInput.value = `${firstApproverSelect.value},${this.value}`;
    } else {
        // If second approver is deselected, keep only first approver
        combinedApproversInput.value = firstApproverSelect.value;
    }
});

// Initialize the form
document.addEventListener('DOMContentLoaded', function() {
    const firstApproverSelect = document.getElementById('approved-mgt');
    const combinedApproversInput = document.getElementById('combined-approvers');
    
    // Set initial value
    if (firstApproverSelect.value) {
        combinedApproversInput.value = firstApproverSelect.value;
    }
});

            },
            "packaging": {

        };

// Function to handle image preview after upload
function previewImage(event) {
    const file = event.target.files[0]; // Get the file that was selected
    const reader = new FileReader(); // Create a FileReader object

    // When the file is successfully loaded
    reader.onload = function(e) {
        const previewContainer = document.getElementById('imagePreviewContainer');
        
        // Clear any previous images
        previewContainer.innerHTML = ''; 

        // Create an image element to display the preview
        const imgPreview = document.createElement('img');
        imgPreview.src = e.target.result; // Set the image source to the loaded file
        imgPreview.style.width = '60px'; // Set the width of the image to 60px
        imgPreview.style.height = '60px'; // Set the height of the image to 60px
        
        // Append the image to the preview container
        previewContainer.appendChild(imgPreview);
    };

    // Read the file as a Data URL (base64 string) for the image preview
    reader.readAsDataURL(file);
}

// Handle form submission
async function handleFormSubmission(event) {
    event.preventDefault();  // Prevent the default form submission
    const form = document.getElementById('test-form');
    const formData = new FormData(form);
    //const errors = validateForm(formData);  // Validate the form and get errors array

    // Clear any previous error/success messages
    /*document.getElementById('form-error').style.display = 'none';
    document.getElementById('form-message').style.display = 'none';

    // If there are validation errors, show them
    if (errors.length > 0) {  // Ensure errors is an array
        document.getElementById('form-error').textContent = errors.join(' ');
        document.getElementById('form-error').style.display = 'block';
        return;
    }*/

    // Disable the submit button and show loading indicator
    toggleSubmitButton(true);
    toggleLoadingIndicator(true);

    try {
        // CSRF token for Django or similar framework
        const csrftoken = document.querySelector('[name=csrfmiddlewaretoken]').value;
        const response = await fetch(form.action || '/submit_form/', {
            method: 'POST',
            headers: {
                'X-CSRFToken': csrftoken,
            },
            body: formData,
        });

        // If server responds with an error
        if (!response.ok) {
            //throw new Error('Server responded with an error: ' + response.statusText);
                    // Try to extract error details from the response body
            const errorText = await response.text(); // Get the error text (raw body)
            throw new Error(
                `Server responded with an error. Status: ${response.status} (${response.statusText}), Body: ${errorText}`
            );
        }

        // Parse the server response
        const responseData = await response.json();

        // If form submission is successful
        if (responseData.status === 'success') {
            document.getElementById('form-message').textContent = 'Form submitted successfully! Redirecting to the dashboard...';
            document.getElementById('form-message').style.display = 'block';

            // Redirect to the dashboard after 2 seconds
            setTimeout(() => {
                window.location.href = responseData.redirect || '/dashboard.html';
            }, 2000);

        } else {
            // Handle any server-side validation errors
            document.getElementById('form-error').textContent = responseData.message || 'An unknown error occurred';
            document.getElementById('form-error').style.display = 'block';
        }

    } catch (error) {
        // Handle any client-side or network errors
        console.error('Error during form submission:', error);
        document.getElementById('form-error').textContent = error.message || 'An error occurred during submission.';
        document.getElementById('form-error').style.display = 'block';

    } finally {
        // Re-enable the submit button and hide loading indicator
        toggleSubmitButton(false);
        toggleLoadingIndicator(false);
    }
}

// Function to toggle the submit button state
function toggleSubmitButton(disable) {
    const submitButton = document.getElementById('submit-form-button');
    submitButton.disabled = disable;
    submitButton.textContent = disable ? 'Processing...' : 'Submit';
}

// Function to toggle loading indicator visibility
function toggleLoadingIndicator(show) {
    const loadingIndicator = document.getElementById('loading-indicator');
    loadingIndicator.style.display = show ? 'inline' : 'none';
}
