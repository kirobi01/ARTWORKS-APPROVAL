<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Report Review</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f9;
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        .header {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 20px;
            padding: 10px;
            border-bottom: 2px solid #ddd;
        }

        .header img {
            height: 80px; /* Adjust based on the logo size */
            margin-bottom: 10px;
        }

        .header h3 {
            margin: 0;
            font-size: 24px;
            color: #333;
        }

        .report-details, .approval-section {
            background-color: #fff;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.2);
            padding: 20px;
            margin-bottom: 20px;
        }

        .report-details table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 20px;
        }

        .report-details th, .report-details td {
            border: 1px solid #ddd;
            padding: 10px;
            text-align: left;
        }

        .report-details th {
            background-color: #f4f4f4;
        }

        .approval-section {
            display: flex;
            flex-direction: column;
        }

        .approval-section div {
            margin-bottom: 20px;
        }

        .approval-section label {
            font-weight: bold;
            margin-right: 10px;
        }

        .approval-section select, .approval-section textarea {
            border: 1px solid #ccc;
            border-radius: 4px;
            padding: 10px;
            font-size: 16px;
            width: 100%;
            box-sizing: border-box; /* Ensure padding is included in width */
        }

        .button-container {
            text-align: center;
            margin-top: 20px;
        }

        .button-container button {
            background-color: #007bff;
            border: none;
            border-radius: 4px;
            color: white;
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            margin: 0 10px;
        }

        .button-container button:hover {
            background-color: #0056b3;
        }

        .button-container .approved {
            background-color: #28a745;
        }

        .button-container .rejected {
            background-color: #dc3545;
        }

        .button-container .approved:hover {
            background-color: #218838;
        }

        .button-container .rejected:hover {
            background-color: #c82333;
        }

        .submitted {
            background-color: #218838;
            color: #fff;
            cursor: not-allowed;
        }

        .submitted:hover {
            background-color: #1e7e34;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <img src="C:/Users/support.user5/Documents/newfolder/RMTR/RMTReports/Templates/headerpng.png" alt="Logo">
            <h3>Raw Materials Test Report</h3>
        </div>

        <div class="report-details">
            <h4>Test Report Details</h4>
            <table>
                <tbody>
                    <tr>
                        <th>Date:</th>
                        <td id="report-date"></td>
                    </tr>
                    <tr>
                        <th>Supplier:</th>
                        <td id="report-supplier"></td>
                    </tr>
                    <tr>
                        <th>RMTR NO:</th>
                        <td id="report-rmtr-no"></td>
                    </tr>
                    <tr>
                        <th>Plant:</th>
                        <td id="report-plant"></td>
                    </tr>
                    <tr>
                        <th>HOD:</th>
                        <td id="report-hod"></td>
                    </tr>
                    
                    <tr>
                        <th>Approved Mgt:</th>
                        <td id="report-approved-mgt"></td>
                    </tr>
                    <tr>
                        <th>Justification:</th>
                        <td id="report-justification"></td>
                    </tr>
                    <tr>
                        <th>Material Type:</th>
                        <td id="report-material-type"></td>
                    </tr>
                    <tr>
                        <th>Raw Material Type:</th>
                        <td id="report-raw-material-type"></td>
                    </tr>
                    <tr>
                        <th>Packing Material Type:</th>
                        <td id="report-packing-material-type"></td>
                    </tr>
                    <tr>
                        <th>Test Type:</th>
                        <td id="report-test-type"></td>
                    </tr>
                    <tr>
                        <th>Test Results:</th>
                        <td id="report-test-results"></td>
                    </tr>
                    <tr>
                        <th>Requested By:</th>
                        <td id="report-trial-requested-by"></td>
                    </tr>
                    <tr>
                        <th>Final Conclusion:</th>
                        <td id="report-final-conclusion"></td>
                    </tr>


                    <tr>
                        <th>UOM</th>
                        <td id="uom"></td>
                    </tr>
                    <tr>
                        <th>Quantity</th>
                        <td id="quantity"></td>
                    </tr>
                    <tr>
                        <th>Specs</th>
                        <td id="specs"></td>
                    </tr>
                </tbody>
            </table>
        </div>

        <div class="approval-section">
            <div>
                <label for="qa-approval">Quality Assurance Approval:</label>
                <select id="qa-approval">
                    <option value="approve">Approve</option>
                    <option value="reject">Reject</option>
                </select>
            </div>
            <div>
                <label for="qa-comments">Comments:</label>
                <textarea id="qa-comments" rows="4"></textarea>
            </div>
        </div>

        <div class="button-container">
            <button id="send-back-button" type="button" onclick="sendBack()">Send Back</button>
            <button id="approve-button" class="approved" type="button" onclick="approve()">Approve</button>
            <button id="reject-button" class="rejected" type="button" onclick="reject()">Reject</button>
        </div>
    </div>

    <script>
        // This fata is entered through Django backend
        document.addEventListener('DOMContentLoaded', function () {
            document.getElementById('report-date').textContent = '2024-09-15'; // Example
            document.getElementById('report-supplier').textContent = 'Ashut'; // Example
            document.getElementById('report-rmtr-no').textContent = 'RMTR-20240915-00000001'; // Example
            document.getElementById('report-plant').textContent = 'Refinery'; // Example
            document.getElementById('report-hod').textContent = 'Francis Muthangya'; // Example
            document.getElementById('report-trial-requested-by').textContent = 'Jane Githinji'; // Example
            document.getElementById('report-approved-mgt').textContent = 'Nitin'; // Example
            document.getElementById('report-justification').textContent = 'Test for new raw material'; // Example
            document.getElementById('report-material-type').textContent = 'Raw Material'; // Example
            document.getElementById('report-raw-material-type').textContent = 'Oils'; // Example
            document.getElementById('report-packing-material-type').textContent = 'N/A'; // Example
            document.getElementById('report-test-type').textContent = 'Drop Test'; // Example
            document.getElementById('report-test-results').textContent = 'Passed'; // Example
            document.getElementById('report-final-conclusion').textContent = 'All tests are satisfactory.'; // Example
        });

        function sendBack() {
            // Logic to handle sending back the report
            alert('Report sent back for revision.');
        }

        function approve() {
            const approvalStatus = document.getElementById('qa-approval').value;
            const comments = document.getElementById('qa-comments').value;

            if (approvalStatus === 'approve') {
                // Logic to approve the report
                alert('Report approved.');
                document.getElementById('approve-button').classList.add('submitted');
                document.getElementById('approve-button').textContent = 'Approved';
            } else {
                alert('Please select approval status.');
            }
        }

        function reject() {
            // Logic to reject the report
            alert('Report rejected.');
        }
    </script>
</body>
</html>
