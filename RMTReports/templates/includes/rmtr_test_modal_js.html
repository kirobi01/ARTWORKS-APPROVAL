{# Shared JS helpers for RMTR/IMP test-result modals. Include once per page that uses View Tests. #}
<script>
  // URL templates (Django reversed)
  // These must exist globally so any page-level JS can call them.
  window.RMTR_TESTS_URL_TEMPLATE = "{% url 'get_rmtr_tests' '__RMTR_NO__' %}";
  window.IMP_RMTR_TESTS_URL_TEMPLATE = "{% url 'imp_rmtr_tests' '__IMP_RMTR_NO__' %}";

  window.RMTRTestModal = (function () {
    function escapeHtml(value) {
      if (value === null || value === undefined) return '';
      return String(value)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/\"/g, '&quot;')
        .replace(/'/g, '&#039;');
    }

    function renderTestEntry(test, label) {
      return `
        <div class="test-entry">
          <h4>${escapeHtml(label)}</h4>
          ${test.tests_carried_out ? `<div class="mb-2"><strong>Test carried out:</strong><p>${escapeHtml(test.tests_carried_out)}</p></div>` : ''}
          ${test.sample_results ? `<div class="mb-2"><strong>Sample results:</strong><p>${escapeHtml(test.sample_results)}</p></div>` : ''}
          ${test.raw_material_results ? `<div class="mb-2"><strong>Raw material results:</strong><p>${escapeHtml(test.raw_material_results)}</p></div>` : ''}
          ${test.kapa_standards ? `<div class="mb-2"><strong>Kapa standards:</strong><p>${escapeHtml(test.kapa_standards)}</p></div>` : ''}
          ${test.lab_qc_comments ? `<div class="mb-2"><strong>Lab QC comments:</strong><p>${escapeHtml(test.lab_qc_comments)}</p></div>` : ''}
        </div>
      `;
    }

    function normalizeData(data) {
      // Accept both the “new” API shape and legacy flat fields.
      const testsToBeDone = (data?.tests_to_be_done ?? data?.tests_to_do ?? data?.tests ?? '').toString().trim();
      const testsList = Array.isArray(data?.tests_list) ? data.tests_list : [];
      const retests = Array.isArray(data?.retests) ? data.retests : [];
      return { testsToBeDone, testsList, retests, raw: data || {} };
    }

    function buildHtml(title, data) {
      const { testsToBeDone, testsList, retests, raw } = normalizeData(data);

      let html = `<h2>${escapeHtml(title)}</h2>`;

      if (testsToBeDone) {
        html += `
          <div class="test-entry">
            <h3>Tests</h3>
            <p>${escapeHtml(testsToBeDone)}</p>
          </div>
        `;
      }

      if (testsList.length) {
        html += `<h3>Test Results</h3><div class="test-entries-container">`;
        for (const t of testsList) {
          html += renderTestEntry(t, `Test ${t.test_number || 'N/A'}`);
        }
        html += `</div>`;
      } else {
        // Legacy fallback: tests_carried_out1..16
        let hasOldTests = false;
        for (let i = 1; i <= 16; i++) {
          if (raw[`tests_carried_out${i}`]) {
            if (!hasOldTests) {
              html += `<h3>Test Results</h3><div class="test-entries-container">`;
              hasOldTests = true;
            }
            html += `
              <div class="test-entry card mb-3">
                <div class="card-header"><h4>Test ${i}</h4></div>
                <div class="card-body">
                  <p><strong>Test:</strong> ${escapeHtml(raw[`tests_carried_out${i}`])}</p>
                  <p><strong>Sample Results:</strong> ${escapeHtml(raw[`sample_results${i}`])}</p>
                  <p><strong>Raw Material Results:</strong> ${escapeHtml(raw[`raw_material_results${i}`])}</p>
                  <p><strong>Standards:</strong> ${escapeHtml(raw[`kapa_standards${i}`])}</p>
                </div>
              </div>
            `;
          }
        }
        if (hasOldTests) {
          html += `</div>`;
        } else if (!testsToBeDone) {
          html += `<p>No tests found.</p>`;
        }
      }

      if (retests.length) {
        html += `<h3 class="mt-4">Retest Tests</h3>`;
        retests.forEach((r, idx) => {
          html += `<div class="test-entry"><h4>Retest ${idx + 1}</h4>`;
          const testData = r?.test_data || {};
          Object.keys(testData).forEach(testNum => {
            html += renderTestEntry(testData[testNum] || {}, `Test ${testNum}`);
          });
          html += `</div>`;
        });
      }

      return html;
    }

    function openModal(modalId) {
      const modal = document.getElementById(modalId);
      if (modal) modal.style.display = 'block';
    }

    function closeModal(modalId) {
      const modal = document.getElementById(modalId);
      if (modal) modal.style.display = 'none';
    }

    async function fetchJson(url) {
      const response = await fetch(url);
      if (!response.ok) {
        throw new Error(`HTTP ${response.status}: ${response.statusText}`);
      }
      return await response.json();
    }

    async function showRMTRTests(rmtrNo, { modalId = 'testCommentsModal', contentId = 'testCommentsContent' } = {}) {
      const modal = document.getElementById(modalId);
      const content = document.getElementById(contentId);
      if (!modal || !content) {
        throw new Error('Modal elements not found');
      }

      content.innerHTML = `<h2 class="mb-4">Loading…</h2>`;
      modal.style.display = 'block';

      const url = window.RMTR_TESTS_URL_TEMPLATE.replace('__RMTR_NO__', encodeURIComponent(rmtrNo));
      const data = await fetchJson(url);
      content.innerHTML = buildHtml(`Tests for RMTR ${rmtrNo}`, data);
    }

    async function showIMPTests(impRmtrNo, { modalId = 'impTestCommentsModal', contentId = 'impTestCommentsContent' } = {}) {
      const modal = document.getElementById(modalId);
      const content = document.getElementById(contentId);
      if (!modal || !content) {
        throw new Error('Modal elements not found');
      }

      content.innerHTML = `<h2 class="mb-4">Loading…</h2>`;
      modal.style.display = 'block';

      const url = window.IMP_RMTR_TESTS_URL_TEMPLATE.replace('__IMP_RMTR_NO__', encodeURIComponent(impRmtrNo));
      const data = await fetchJson(url);
      content.innerHTML = buildHtml(`Tests for ${impRmtrNo}`, data);
    }

    return {
      escapeHtml,
      buildHtml,
      openModal,
      closeModal,
      showRMTRTests,
      showIMPTests,
    };
  })();
</script>
