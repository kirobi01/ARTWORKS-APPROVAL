{% load static %}

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .login-container {
            background-color: white;
            padding: 30px;
            box-shadow: 0px 4px 10px rgba(0, 0, 0, 0.1);
            width: 300px;
            border-radius: 8px;
            text-align: center;
        }

        h2 {
            text-align: center;
            color: #333;
        }

        .logo {
            width: 100px;
            margin-bottom: 20px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            font-size: 14px;
            font-weight: bold;
            color: #555;
        }

        input {
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            font-size: 14px;
            border: 1px solid #ddd;
            border-radius: 4px;
        }

        button {
            width: 100%;
            padding: 10px;
            background-color: #5c6bc0;
            border: none;
            color: white;
            font-size: 16px;
            cursor: pointer;
            border-radius: 4px;
        }

        button:hover {
            background-color: #3f51b5;
        }

        /* Error and Success message styles */
        .messages {
            display: block; /* Always visible when there are messages */
            margin-bottom: 20px;
            padding: 10px;
            border-radius: 4px;
            font-size: 14px;
        }

        .error-messages {
            background-color: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .success-message {
            background-color: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        /* Loading Spinner */
        #loader {
            display: none;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 24px;
        }
    </style>
</head>
{% load static %}
<body>
    <div class="login-container">
        <!-- Logo at the top -->
        <img src="{% static 'images/logo.png' %}" alt="Logo" class="logo">

        <h2>Login</h2>

        {% if messages %}
            <div class="messages">
                {% for message in messages %}
                    {% if message.tags == 'error' %}
                        <div class="error-messages">{{ message }}</div>
                    {% elif message.tags == 'success' %}
                        <div class="success-message">{{ message }}</div>
                    {% endif %}
                {% endfor %}
            </div>
        {% endif %}

        <!-- Removed RMTReports from form action -->
        <form method="POST" id="loginForm" onsubmit="showLoader()">
            {% csrf_token %}
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" placeholder="Enter your username" required>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="Enter your password" required>
            </div>

            <button type="submit">Login</button>
        </form>

        <!-- Loading Spinner -->
        <div id="loader">Logging in...</div>
    </div>

    <!-- Inline JavaScript -->
    <script>
        function showLoader() {
            document.getElementById('loader').style.display = 'block';
        }

        window.onload = function() {
            document.getElementById('loader').style.display = 'none';
        };
    </script>
</body>
</html>
