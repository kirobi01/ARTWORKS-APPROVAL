# Isolated Compose project — won't clash with other stacks on 10.0.0.27
name: artwork

networks:
  artwork_net:
    driver: bridge

services:
  # Private Artwork-only Postgres — does NOT touch the host Postgres
  db:
    image: postgres:16-alpine
    container_name: artwork-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: artwork
      POSTGRES_USER: artwork
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    networks:
      - artwork_net
    volumes:
      - artwork_pg_data:/var/lib/postgresql/data
    # Not published on the host — host Postgres on 5432 stays untouched
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U artwork -d artwork"]
      interval: 5s
      timeout: 5s
      retries: 10
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 512M

  redis:
    image: redis:7-alpine
    container_name: artwork-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --save 60 1
    networks:
      - artwork_net
    volumes:
      - artwork_redis_data:/data
    expose:
      - "6379"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 256M

  web:
    build: .
    image: artwork-approval:latest
    container_name: artwork-web
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.production
      DB_HOST: db
      DB_PORT: "5432"
      DB_NAME: artwork
      DB_USER: artwork
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - artwork_net
    volumes:
      - artwork_static:/app/staticfiles
      - artwork_media:/app/media
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    expose:
      - "8000"
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"
    deploy:
      resources:
        limits:
          memory: 1G

  worker:
    image: artwork-approval:latest
    container_name: artwork-worker
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.production
      DB_HOST: db
      DB_PORT: "5432"
      DB_NAME: artwork
      DB_USER: artwork
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - artwork_net
    volumes:
      - artwork_media:/app/media
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
      web:
        condition: service_started
    command: celery -A config.celery worker -l info --concurrency=2
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"
    deploy:
      resources:
        limits:
          memory: 1G

  beat:
    image: artwork-approval:latest
    container_name: artwork-beat
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.production
      DB_HOST: db
      DB_PORT: "5432"
      DB_NAME: artwork
      DB_USER: artwork
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - artwork_net
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
      worker:
        condition: service_started
    command: celery -A config.celery beat -l info
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 256M

  nginx:
    image: nginx:1.27-alpine
    container_name: artwork-nginx
    restart: unless-stopped
    networks:
      - artwork_net
    ports:
      - "8027:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - artwork_static:/app/staticfiles:ro
      - artwork_media:/app/media:ro
    depends_on:
      - web
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 128M

volumes:
  artwork_pg_data:
  artwork_redis_data:
  artwork_static:
  artwork_media:
